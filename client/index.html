<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Maruti Furniture | Job Card & ERP Management System</title>
    <meta name="description" content="Maruti Furniture internal ERP — manage job cards, quotations, projects, clients, production stages, and invoices in one platform." />
    <meta name="keywords" content="Maruti Furniture, furniture ERP, job card management, furniture production, interior design management" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="author" content="Maruti Furniture" />

    <!-- Canonical URL — helps establish domain legitimacy -->
    <link rel="canonical" href="https://jobcard.marutifurniture.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/Maruti icon_New.svg" />
    <link rel="shortcut icon" href="/Maruti icon_New.svg" />
    <link rel="apple-touch-icon" href="/Maruti icon_New.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme -->
    <meta name="theme-color" content="#c8a84b" />
    <meta name="msapplication-TileColor" content="#c8a84b" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph / Social — helps domain reputation scanners classify site correctly -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jobcard.marutifurniture.com/" />
    <meta property="og:title" content="Maruti Furniture | Job Card & ERP System" />
    <meta property="og:description" content="Internal ERP platform for Maruti Furniture — job cards, quotations, projects, production stages, and more." />
    <meta property="og:image" content="https://jobcard.marutifurniture.com/Maruti icon_New.svg" />
    <meta property="og:site_name" content="Maruti Furniture ERP" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Maruti Furniture | ERP System" />
    <meta name="twitter:description" content="Internal management platform for Maruti Furniture." />
    <meta name="twitter:image" content="https://jobcard.marutifurniture.com/Maruti icon_New.svg" />

    <!-- Security headers (Note: X-Frame-Options and X-Content-Type-Options are ignored in <meta> tags by browsers) -->
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Structured Data — helps reputation scanners identify this as a legit business tool -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Maruti Furniture ERP",
      "url": "https://jobcard.marutifurniture.com",
      "description": "Internal job card and ERP management system for Maruti Furniture",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "author": {
        "@type": "Organization",
        "name": "Maruti Furniture",
        "url": "https://marutifurniture.com"
      }
    }
    </script>

    <meta name="application-name" content="Maruti Furniture ERP" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
